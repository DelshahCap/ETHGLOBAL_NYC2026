<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1160 840" font-family="-apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#475569"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#dc2626"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#2563eb"/>
    </marker>
    <marker id="arrowTeal" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#0d9488"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1160" height="840" fill="#ffffff"/>

  <!-- Title -->
  <text x="40" y="38" font-size="24" font-weight="700" fill="#0f172a">HPD Rent Escrow — System Architecture</text>
  <text x="40" y="60" font-size="13.5" fill="#64748b">Arc testnet (chain 5042002). Two domains meet at the EscrowVault: the frontend (create / fund / read / withdraw) and the oracle backend (settlement trigger).</text>

  <!-- ============ ORACLE BACKEND BAND ============ -->
  <rect x="30" y="80" width="1100" height="200" rx="12" fill="#faf5ff" stroke="#c4b5fd" stroke-width="1.5"/>
  <text x="48" y="104" font-size="13" font-weight="700" fill="#7c3aed" letter-spacing="0.5">ORACLE BACKEND — Don  ·  settlement trigger (no UI)</text>

  <!-- HPD -->
  <rect x="48" y="120" width="225" height="86" rx="9" fill="#ffffff" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="160" y="150" font-size="14.5" font-weight="700" fill="#0f172a" text-anchor="middle">NYC HPD Open Data</text>
  <text x="160" y="170" font-size="12" fill="#475569" text-anchor="middle">Socrata dataset wvxf-dwi5</text>
  <text x="160" y="189" font-size="11.5" fill="#7c3aed" text-anchor="middle" font-style="italic">live violation status</text>

  <!-- CRE workflow -->
  <rect x="345" y="120" width="245" height="86" rx="9" fill="#ffffff" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="467" y="148" font-size="14.5" font-weight="700" fill="#0f172a" text-anchor="middle">CRE Workflow (TS, cron)</text>
  <text x="467" y="168" font-size="12" fill="#475569" text-anchor="middle">poll by violationId →</text>
  <text x="467" y="186" font-size="12" fill="#475569" text-anchor="middle">mapStatus → 0 / 1 / 2</text>

  <!-- MockForwarder -->
  <rect x="662" y="120" width="245" height="86" rx="9" fill="#ffffff" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="784" y="148" font-size="14.5" font-weight="700" fill="#0f172a" text-anchor="middle">Arc MockForwarder</text>
  <text x="784" y="168" font-size="11.5" fill="#334155" text-anchor="middle" font-family="ui-monospace, Menlo, monospace">0x6E9E…eDc1</text>
  <text x="784" y="187" font-size="11" fill="#7c3aed" text-anchor="middle" font-style="italic">(simulation; prod = KeystoneForwarder)</text>

  <!-- arrows in oracle band -->
  <line x1="273" y1="163" x2="343" y2="163" stroke="#7c3aed" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="308" y="155" font-size="10.5" fill="#7c3aed" text-anchor="middle">GET (live)</text>

  <line x1="590" y1="163" x2="660" y2="163" stroke="#7c3aed" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="625" y="150" font-size="10.5" fill="#7c3aed" text-anchor="middle">report →</text>
  <text x="625" y="178" font-size="10.5" fill="#7c3aed" text-anchor="middle">writeReport</text>

  <!-- report shape note -->
  <text x="784" y="228" font-size="11" fill="#6b21a8" text-anchor="middle" font-family="ui-monospace, Menlo, monospace">report = abi.encode(uint256 id, uint8 status)</text>
  <text x="784" y="246" font-size="10.5" fill="#94a3b8" text-anchor="middle">Status: Open=0 · Closed=1 · Dismissed=2</text>

  <!-- ============ ON-CHAIN BAND ============ -->
  <rect x="30" y="300" width="1100" height="270" rx="12" fill="#f0fdfa" stroke="#5eead4" stroke-width="1.5"/>
  <text x="48" y="324" font-size="13" font-weight="700" fill="#0d9488" letter-spacing="0.5">ON-CHAIN — Arc testnet</text>

  <!-- Receiver -->
  <rect x="662" y="340" width="245" height="84" rx="9" fill="#ffffff" stroke="#2dd4bf" stroke-width="1.5"/>
  <text x="784" y="368" font-size="14.5" font-weight="700" fill="#0f172a" text-anchor="middle">EscrowVaultReceiver</text>
  <text x="784" y="388" font-size="11.5" fill="#334155" text-anchor="middle" font-family="ui-monospace, Menlo, monospace">0x9244…Ae00f</text>
  <text x="784" y="407" font-size="11.5" fill="#475569" text-anchor="middle">onReport → _processReport (decode)</text>

  <!-- Vault (hub) -->
  <rect x="345" y="340" width="245" height="170" rx="10" fill="#ffffff" stroke="#0d9488" stroke-width="2.5"/>
  <text x="467" y="368" font-size="16" font-weight="700" fill="#0f172a" text-anchor="middle">EscrowVault</text>
  <text x="467" y="387" font-size="11.5" fill="#334155" text-anchor="middle" font-family="ui-monospace, Menlo, monospace">0x83B7…CF3D</text>
  <line x1="362" y1="398" x2="573" y2="398" stroke="#e2e8f0" stroke-width="1"/>
  <text x="467" y="417" font-size="11" fill="#475569" text-anchor="middle">createEscrow · fund · withdraw</text>
  <text x="467" y="436" font-size="11" fill="#b45309" text-anchor="middle" font-weight="600">updateStatus(id,status) — onlyOracle</text>
  <text x="467" y="455" font-size="11" fill="#475569" text-anchor="middle">_settle → credits withdrawable[]</text>
  <text x="467" y="478" font-size="10" fill="#64748b" text-anchor="middle">Closed → fee→contractor, rest→landlord</text>
  <text x="467" y="493" font-size="10" fill="#64748b" text-anchor="middle">Dismissed → landlord · yield → tenant</text>

  <!-- MockYieldSource -->
  <rect x="48" y="360" width="225" height="92" rx="9" fill="#ffffff" stroke="#2dd4bf" stroke-width="1.5"/>
  <text x="160" y="388" font-size="14.5" font-weight="700" fill="#0f172a" text-anchor="middle">MockYieldSource</text>
  <text x="160" y="408" font-size="11.5" fill="#334155" text-anchor="middle" font-family="ui-monospace, Menlo, monospace">0xB610…0736</text>
  <text x="160" y="427" font-size="11.5" fill="#475569" text-anchor="middle">pooled USDC · shares</text>

  <!-- USDC chip -->
  <rect x="662" y="468" width="245" height="56" rx="9" fill="#ffffff" stroke="#94a3b8" stroke-width="1.3" stroke-dasharray="4 3"/>
  <text x="784" y="492" font-size="12.5" font-weight="700" fill="#0f172a" text-anchor="middle">USDC predeploy</text>
  <text x="784" y="510" font-size="11" fill="#475569" text-anchor="middle" font-family="ui-monospace, Menlo, monospace">0x3600…0000 · 6 dec · gas token</text>

  <!-- MockForwarder -> Receiver (down) -->
  <line x1="784" y1="206" x2="784" y2="338" stroke="#7c3aed" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="794" y="278" font-size="11" fill="#7c3aed">onReport</text>

  <!-- Receiver -> Vault : updateStatus (THE trust boundary, red) -->
  <line x1="662" y1="382" x2="592" y2="400" stroke="#dc2626" stroke-width="2.5" marker-end="url(#arrowRed)"/>
  <text x="627" y="360" font-size="11" fill="#dc2626" text-anchor="middle" font-weight="700">updateStatus</text>
  <text x="627" y="345" font-size="10" fill="#dc2626" text-anchor="middle">(onlyOracle ✓)</text>

  <!-- Vault <-> MockYieldSource -->
  <line x1="345" y1="396" x2="275" y2="396" stroke="#0d9488" stroke-width="2" marker-end="url(#arrowTeal)"/>
  <text x="310" y="388" font-size="10" fill="#0d9488" text-anchor="middle">deposit→shares</text>
  <line x1="273" y1="420" x2="343" y2="420" stroke="#0d9488" stroke-width="2" marker-end="url(#arrowTeal)"/>
  <text x="310" y="438" font-size="10" fill="#0d9488" text-anchor="middle">redeem→assets</text>

  <!-- Vault -> USDC -->
  <line x1="573" y1="470" x2="660" y2="494" stroke="#0d9488" stroke-width="1.6" stroke-dasharray="4 3" marker-end="url(#arrowTeal)"/>
  <text x="618" y="488" font-size="9.5" fill="#0d9488" text-anchor="middle">transfer(From)</text>

  <!-- ============ FRONTEND BAND ============ -->
  <rect x="30" y="590" width="1100" height="220" rx="12" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="48" y="614" font-size="13" font-weight="700" fill="#2563eb" letter-spacing="0.5">FRONTEND — Nilesh  ·  Next.js + Privy + viem</text>

  <!-- UI box -->
  <rect x="345" y="632" width="245" height="140" rx="10" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
  <text x="467" y="662" font-size="15" font-weight="700" fill="#0f172a" text-anchor="middle">UI / wallet (Privy)</text>
  <line x1="362" y1="674" x2="573" y2="674" stroke="#e2e8f0" stroke-width="1"/>
  <text x="467" y="695" font-size="11.5" fill="#475569" text-anchor="middle">① createEscrow</text>
  <text x="467" y="714" font-size="11.5" fill="#475569" text-anchor="middle">② approve + fund</text>
  <text x="467" y="733" font-size="11.5" fill="#475569" text-anchor="middle">③ read escrows / withdrawable</text>
  <text x="467" y="752" font-size="11.5" fill="#475569" text-anchor="middle">⑤ withdraw()</text>

  <!-- UI writes up to vault -->
  <line x1="410" y1="632" x2="410" y2="512" stroke="#2563eb" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <text x="345" y="560" font-size="10.5" fill="#2563eb" text-anchor="end">writes</text>

  <!-- UI reads up to vault -->
  <line x1="467" y1="632" x2="467" y2="512" stroke="#2563eb" stroke-width="1.6" stroke-dasharray="5 3" marker-end="url(#arrowBlue)"/>
  <text x="475" y="560" font-size="10.5" fill="#2563eb">reads</text>

  <!-- Vault events down to UI (watch) -->
  <line x1="525" y1="512" x2="525" y2="632" stroke="#2563eb" stroke-width="1.6" stroke-dasharray="2 3" marker-end="url(#arrowBlue)"/>
  <text x="533" y="560" font-size="10.5" fill="#2563eb">④ watch</text>
  <text x="533" y="574" font-size="9.5" fill="#2563eb">Settled</text>

  <!-- Callout: frontend never settles -->
  <rect x="662" y="632" width="445" height="140" rx="10" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="684" y="660" font-size="13.5" font-weight="700" fill="#b45309">⚠  The frontend never settles</text>
  <text x="684" y="684" font-size="12" fill="#475569">The UI does not call <tspan font-family="ui-monospace, Menlo, monospace" fill="#dc2626">updateStatus()</tspan>. Settlement is the</text>
  <text x="684" y="703" font-size="12" fill="#475569">oracle path (top band): live HPD → CRE → forwarder →</text>
  <text x="684" y="722" font-size="12" fill="#475569"><tspan font-family="ui-monospace, Menlo, monospace">updateStatus</tspan> → <tspan font-family="ui-monospace, Menlo, monospace">_settle</tspan>.</text>
  <text x="684" y="746" font-size="12" fill="#475569">The UI reacts to the <tspan font-weight="700" fill="#0f172a">Settled</tspan> event, then each party</text>
  <text x="684" y="765" font-size="12" fill="#475569">claims via <tspan font-family="ui-monospace, Menlo, monospace">withdraw()</tspan> (pull-payment).</text>

  <!-- Legend -->
  <text x="965" y="104" font-size="11" font-weight="700" fill="#475569">legend</text>
  <line x1="965" y1="118" x2="995" y2="118" stroke="#dc2626" stroke-width="2.5"/>
  <text x="1001" y="122" font-size="10.5" fill="#475569">trust boundary (onlyOracle)</text>
  <line x1="965" y1="136" x2="995" y2="136" stroke="#2563eb" stroke-width="2"/>
  <text x="1001" y="140" font-size="10.5" fill="#475569">frontend call</text>
  <line x1="965" y1="154" x2="995" y2="154" stroke="#0d9488" stroke-width="2"/>
  <text x="1001" y="158" font-size="10.5" fill="#475569">on-chain internal</text>
</svg>
